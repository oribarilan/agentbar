[package]
name = "agentbar"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "agentbar"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "macos-private-api"] }
tauri-plugin-shell = "2"
serde_json = "1"
tokio = { version = "1", features = ["time"] }

[profile.release]
strip = true
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
